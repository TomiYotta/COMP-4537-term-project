<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body class="wb-bg min-h-screen flex items-center justify-center px-4">

  <div class="wb-card w-full max-w-sm bg-[#fafaf7] border-[2.5px] border-[#2d2d2d] rounded-sm p-8">

    <h2 class="font-caveat text-center text-[1.6rem] font-bold text-[#1a1a1a] mb-5 tracking-wide">
      Real-Time Classroom
    </h2>

    <p class="font-caveat text-center text-base text-[#444] mb-6">Enter your new password below.</p>

    <div id="error-msg" class="hidden font-caveat text-[#e05a5a] text-base font-bold text-center mb-3"></div>
    <div id="success-msg" class="hidden font-caveat text-[#4a9e6b] text-base font-bold text-center mb-3"></div>

    <div class="mb-4">
      <label class="font-caveat block mb-1 text-base font-semibold text-[#444]">New Password</label>
      <input type="password" id="new-password" placeholder="Min. 8 characters"
        class="wb-input w-full bg-transparent border-b-2 border-[#aaa] px-0.5 py-1.5 text-[#1a1a1a] text-sm outline-none"/>
    </div>

    <div class="mb-4">
      <label class="font-caveat block mb-1 text-base font-semibold text-[#444]">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat password"
        class="wb-input w-full bg-transparent border-b-2 border-[#aaa] px-0.5 py-1.5 text-[#1a1a1a] text-sm outline-none"/>
    </div>

    <button onclick="handleReset()"
      class="wb-btn w-full mt-5 py-2.5 bg-[#2d2d2d] text-[#fafaf7] text-lg font-bold rounded-sm border-[2.5px] border-[#2d2d2d] cursor-pointer tracking-wide hover:-translate-y-px active:translate-y-px transition-transform">
      Reset Password →
    </button>

    <button onclick="window.location.href='Auth.html'"
      class="w-full mt-3 py-2 font-caveat text-sm text-[#888] bg-transparent border-none cursor-pointer hover:text-[#2d2d2d] transition-colors">
      ← Back to Log In
    </button>

  </div>
<script src="js/reset-password.js"></script>
</body>
</html>
